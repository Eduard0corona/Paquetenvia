openapi: 3.1.0
info:
  title: Paquetería Local Culiacán API
  version: 0.6.0
  description: Contrato REST normativo v0.6. REST/PostgreSQL son autoridad; SignalR distribuye eventos confirmados. Seguridad
    tenant, tracking público y outbox siguen contratos ejecutables.
servers:
- url: /api/v1
security:
- oidc: []
tags:
- name: Quotes
- name: Orders
- name: Dispatch
- name: Driver
- name: Tracking
- name: Proofs
- name: Incidents
- name: Organizations
- name: Audit
- name: Identity
- name: Locations
- name: Drivers
- name: Finance
- name: Custody
paths:
  /quotes:
    post:
      tags:
      - Quotes
      operationId: createQuote
      parameters:
      - $ref: '#/components/parameters/OrganizationContext'
      - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateQuoteRequest'
      responses:
        '201':
          description: Quote created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Quote'
        '422':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /orders:
    post:
      tags:
      - Orders
      operationId: createOrder
      parameters:
      - $ref: '#/components/parameters/OrganizationContext'
      - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
      responses:
        '201':
          description: Order created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '409':
          $ref: '#/components/responses/Conflict'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    get:
      tags:
      - Orders
      operationId: listOrders
      parameters:
      - $ref: '#/components/parameters/OrganizationContext'
      - name: status
        in: query
        schema:
          $ref: '#/components/schemas/OrderStatus'
      - name: owner_org_id
        in: query
        schema:
          type: string
          format: uuid
      - name: cursor
        in: query
        schema:
          type: string
      responses:
        '200':
          description: Tenant-filtered orders
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/Order'
                  next_cursor:
                    type:
                    - string
                    - 'null'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /orders/{orderId}:
    get:
      tags:
      - Orders
      operationId: getOrder
      parameters:
      - $ref: '#/components/parameters/OrganizationContext'
      - $ref: '#/components/parameters/OrderId'
      responses:
        '200':
          description: Order
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderDetail'
        '404':
          $ref: '#/components/responses/UniformNotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /orders/{orderId}/transitions:
    post:
      tags:
      - Orders
      operationId: transitionOrder
      parameters:
      - $ref: '#/components/parameters/OrganizationContext'
      - $ref: '#/components/parameters/OrderId'
      - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransitionRequest'
      responses:
        '200':
          description: Transition applied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '409':
          $ref: '#/components/responses/Conflict'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /orders/{orderId}/assignments:
    post:
      tags:
      - Dispatch
      operationId: assignDriver
      description: >-
        DSP-002 creates only OWN assignments. EXTERNAL and ALLY_CAPACITY remain
        reserved vocabulary and are rejected until their owning backlog items
        are implemented. route_id may be omitted or null; a non-null route is
        rejected until Routing is implemented.
      parameters:
      - $ref: '#/components/parameters/OrganizationContext'
      - $ref: '#/components/parameters/OrderId'
      - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAssignmentRequest'
      responses:
        '201':
          description: Assignment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Assignment'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/UniformNotFound'
        '409':
          $ref: '#/components/responses/DispatchAssignmentConflict'
  /external-offers:
    post:
      tags:
      - Dispatch
      operationId: createExternalOffer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOfferRequest'
      responses:
        '201':
          description: Offer opened
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExternalOffer'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
      parameters:
      - $ref: '#/components/parameters/OrganizationContext'
      - $ref: '#/components/parameters/IdempotencyKey'
  /external-offers/{offerId}/accept:
    post:
      tags:
      - Driver
      operationId: acceptExternalOffer
      parameters:
      - $ref: '#/components/parameters/OrganizationContext'
      - name: offerId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: Accepted once
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Assignment'
        '409':
          $ref: '#/components/responses/Conflict'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /driver/me/stops:
    get:
      tags:
      - Driver
      operationId: listMyStops
      responses:
        '200':
          description: Active assigned stops only
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DriverStop'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
      parameters:
      - $ref: '#/components/parameters/OrganizationContext'
  /orders/{orderId}/proofs:
    post:
      tags:
      - Custody
      operationId: finalizeProof
      parameters:
      - $ref: '#/components/parameters/OrganizationContext'
      - $ref: '#/components/parameters/OrderId'
      - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FinalizeProofRequest'
      responses:
        '201':
          description: Proof finalized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Proof'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/UniformNotFound'
  /orders/{orderId}/incidents:
    post:
      tags:
      - Incidents
      operationId: openIncident
      parameters:
      - $ref: '#/components/parameters/OrganizationContext'
      - $ref: '#/components/parameters/OrderId'
      - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OpenIncidentRequest'
      responses:
        '201':
          description: Incident opened
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Incident'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /tracking/{token}:
    get:
      tags:
      - Tracking
      security: []
      operationId: publicTracking
      parameters:
      - name: token
        in: path
        required: true
        schema:
          type: string
          minLength: 32
      responses:
        '200':
          description: Minimal public tracking view
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicTrackingProjection'
        '404':
          $ref: '#/components/responses/UniformNotFound'
  /organizations/{organizationId}/audit:
    get:
      tags:
      - Audit
      operationId: listAudit
      parameters:
      - $ref: '#/components/parameters/OrganizationContext'
      - name: organizationId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: Audit page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditPage'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /driver/me/location-updates:
    post:
      tags:
      - Driver
      operationId: publishDriverLocation
      description: Persists deduplicated driver telemetry. SignalR is server-push only; this endpoint is authoritative ingestion.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DriverLocationBatchRequest'
      responses:
        '202':
          description: Batch accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DriverLocationBatchResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/UniformNotFound'
      parameters:
      - $ref: '#/components/parameters/OrganizationContext'
  /quotes/{quoteId}:
    get:
      tags:
      - Pricing
      operationId: getQuote
      parameters:
      - $ref: '#/components/parameters/OrganizationContext'
      - name: quoteId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Quote'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/UniformNotFound'
  /me/organization-contexts:
    get:
      tags:
      - Identity
      operationId: listOrganizationContexts
      parameters: []
      responses:
        '200':
          description: Active authorized contexts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrganizationContext'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /cities:
    get:
      tags:
      - Locations
      operationId: listCities
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/City'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/UniformNotFound'
      parameters:
      - $ref: '#/components/parameters/OrganizationContext'
  /service-areas:
    get:
      tags:
      - Locations
      operationId: listServiceAreas
      parameters:
      - $ref: '#/components/parameters/OrganizationContext'
      - name: city_id
        in: query
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ServiceArea'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/UniformNotFound'
  /operating-zones:
    get:
      tags:
      - Locations
      operationId: listOperatingZones
      parameters:
      - $ref: '#/components/parameters/OrganizationContext'
      - name: service_area_id
        in: query
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OperatingZone'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/UniformNotFound'
  /locations:
    get:
      tags:
      - Locations
      operationId: listLocations
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Location'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/UniformNotFound'
      parameters:
      - $ref: '#/components/parameters/OrganizationContext'
    post:
      tags:
      - Locations
      operationId: createLocation
      parameters:
      - $ref: '#/components/parameters/OrganizationContext'
      - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLocationRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Location'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/UniformNotFound'
  /orders/{orderId}/proof-upload-sessions:
    post:
      tags:
      - Custody
      operationId: createProofUploadSession
      parameters:
      - $ref: '#/components/parameters/OrganizationContext'
      - $ref: '#/components/parameters/OrderId'
      - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProofUploadSessionRequest'
      responses:
        '201':
          description: Upload session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProofUploadSession'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/UniformNotFound'
  /driver/me/documents:
    get:
      tags:
      - Drivers
      operationId: listMyDriverDocuments
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DriverDocument'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/UniformNotFound'
      parameters:
      - $ref: '#/components/parameters/OrganizationContext'
    post:
      tags:
      - Drivers
      operationId: registerMyDriverDocument
      parameters:
      - $ref: '#/components/parameters/OrganizationContext'
      - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterDriverDocumentRequest'
      responses:
        '201':
          description: Registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DriverDocument'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/UniformNotFound'
  /orders/{orderId}/cod-records:
    post:
      tags:
      - Finance
      operationId: recordCodCollection
      parameters:
      - $ref: '#/components/parameters/OrganizationContext'
      - $ref: '#/components/parameters/OrderId'
      - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecordCodRequest'
      responses:
        '201':
          description: COD recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CodTransaction'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/UniformNotFound'
  /cod-records/{codId}/reconcile:
    post:
      tags:
      - Finance
      operationId: reconcileCod
      parameters:
      - $ref: '#/components/parameters/OrganizationContext'
      - name: codId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - $ref: '#/components/parameters/IdempotencyKey'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CodTransaction'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/UniformNotFound'
components:
  securitySchemes:
    oidc:
      type: openIdConnect
      openIdConnectUrl: https://identity.example/.well-known/openid-configuration
  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        minLength: 16
        maxLength: 128
    OrderId:
      name: orderId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    OrganizationContext:
      name: X-Organization-Id
      in: header
      required: true
      description: Organización activa; debe corresponder a una membresía ACTIVE del usuario.
      schema:
        type: string
        format: uuid
  responses:
    ValidationError:
      description: Validation failed
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    Conflict:
      description: State, idempotency or concurrency conflict
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    DispatchAssignmentConflict:
      description: >-
        DSP-002 request, idempotency, state, concurrency, eligibility, capacity
        or replay-evidence conflict. Internal rejection evidence and PII are
        never exposed.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/DispatchAssignmentConflictProblem'
    NotFound:
      description: Not found or inaccessible
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    Unauthorized:
      description: Missing or invalid authentication
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    Forbidden:
      description: Authenticated actor lacks capability inside an otherwise visible tenant context
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
    UniformNotFound:
      description: Missing, cross-tenant, expired or revoked resource. Response must not reveal existence.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'
  schemas:
    Money:
      type: object
      required:
      - currency
      - amount_cents
      properties:
        currency:
          type: string
          const: MXN
        amount_cents:
          type: integer
          minimum: 0
          format: int64
    OrderStatus:
      type: string
      enum:
      - DRAFT
      - CONFIRMED
      - READY_FOR_PICKUP
      - ASSIGNED
      - AT_PICKUP
      - PICKED_UP
      - IN_TRANSIT
      - DELIVERING
      - FAILED_ATTEMPT
      - RESCHEDULED
      - RETURNING
      - RETURNED
      - DELIVERED
      - CLOSED
      - CLAIM_OPEN
      - CLAIM_RESOLVED
      - CANCELLED
    AddressInput:
      type: object
      required:
      - address_text
      - contact_name
      - phone
      properties:
        address_text:
          type: string
          minLength: 8
        contact_name:
          type: string
        phone:
          type: string
        lat:
          type: number
          minimum: -90
          maximum: 90
        lng:
          type: number
          minimum: -180
          maximum: 180
        references:
          type: string
          maxLength: 500
    CreateQuoteRequest:
      type: object
      required:
      - origin
      - destination
      - service_type
      - packages
      properties:
        client_account_id:
          type: string
          format: uuid
        origin:
          $ref: '#/components/schemas/AddressInput'
        destination:
          $ref: '#/components/schemas/AddressInput'
        service_type:
          type: string
          enum:
          - SAME_DAY
          - URGENT
          - SCHEDULED_ROUTE
        consolidated_route:
          type: boolean
          default: false
        packages:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/PackageInput'
      description: Owner organization is derived from X-Organization-Id after membership validation.
    PackageInput:
      type: object
      required:
      - description
      - weight_grams
      - declared_value_cents
      properties:
        description:
          type: string
          maxLength: 250
        weight_grams:
          type: integer
          minimum: 1
        declared_value_cents:
          type: integer
          minimum: 0
          format: int64
        length_mm:
          type: integer
          minimum: 1
        width_mm:
          type: integer
          minimum: 1
        height_mm:
          type: integer
          minimum: 1
    Quote:
      type: object
      required:
      - id
      - net
      - tax
      - total
      - rule_ids
      - expires_at
      - origin_location_id
      - destination_location_id
      - service_type
      - consolidated_route
      - package_snapshot
      - pricing_tier
      - minimum_total_cents_snapshot
      - pricing_policy_version
      - status
      - city_id
      properties:
        id:
          type: string
          format: uuid
        net:
          $ref: '#/components/schemas/Money'
        tax:
          $ref: '#/components/schemas/Money'
        total:
          $ref: '#/components/schemas/Money'
        rule_ids:
          type: array
          items:
            type: string
            format: uuid
        breakdown:
          type: array
          items:
            type: object
            additionalProperties: true
        expires_at:
          type: string
          format: date-time
        origin_location_id:
          type: string
          format: uuid
        destination_location_id:
          type: string
          format: uuid
        service_type:
          type: string
          enum:
          - SAME_DAY
          - URGENT
          - SCHEDULED_ROUTE
        consolidated_route:
          type: boolean
        package_snapshot:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/PackageInput'
        city_id:
          type: string
          format: uuid
        service_area_id:
          type:
          - string
          - 'null'
          format: uuid
        pricing_tier:
          $ref: '#/components/schemas/PricingTier'
        minimum_total_cents_snapshot:
          type: integer
          minimum: 0
          format: int64
        pricing_policy_version:
          type: string
        status:
          type: string
          enum:
          - ACTIVE
          - USED
          - EXPIRED
          - REVOKED
        request_snapshot_redacted:
          type: object
          additionalProperties: true
          description: Must not contain plaintext address, contact name, telephone or access notes.
    CreateOrderRequest:
      type: object
      required:
      - quote_id
      - payer_type
      - acceptance
      properties:
