technical_decisions:
  backend_runtime: .NET 10 LTS
  api_framework: ASP.NET Core Web API
  realtime: ASP.NET Core SignalR
  frontend: Next.js/React/TypeScript PWA
  status: APPROVED_V0_6
  architecture_style: modular monolith
  module_layers: Domain/Application/Infrastructure/Endpoints
  source_of_truth: PostgreSQL/PostGIS
  event_delivery: transactional outbox + .NET Worker
  scaling_strategy: horizontal scale first; selective extraction by metrics and ADR
  scalability_contract: AI-15_SCALABILITY_CONTRACT.yaml
  quote_order_contract: quote owns normalized location references and package snapshot; order copies them
  authorization_model: organization-scoped memberships
  rls_model: separate DB roles + FORCE RLS
  driver_location_ingestion: REST persistence then outbox/SignalR
  rls_bootstrap: NOLOGIN BYPASSRLS function-owner role with column-limited SELECT
  worker_model: NOBYPASSRLS worker; privileged cross-tenant claim only through security functions
  physical_schemas: one schema per normative module plus platform/security
  tenant_context: transaction-local set_config with retry reapplication
  pod_upload: signed URL quarantine/validation/promotion/finalization
  pricing_guard: pricing_tier + minimum_total_cents_snapshot
  gps: batch ingestion + dedicated location outbox
  authorization_visibility: 401 invalid auth; 403 missing capability; 404 absent/cross-tenant/invalid public token
  extension_layout: pgcrypto in extensions; PostGIS in public with runtime USAGE and CREATE revoked
  token_hash: SHA-256 exact UTF-8 token bytes; C#/SQL symmetry contract test
  outbox_lifecycle: function-only lease-protected claim/settle/requeue; maintenance-owned purge
  public_tracking: AI-04 public vocabulary + private-by-default public_event_code timeline
  legal_acceptance: append-only order_acceptances with project-specific deterministic canonical form
  money_storage: bigint cents / OpenAPI int64
  provisioning: application-generated UUIDs pre-authorized only inside transaction-local RLS context
  dispatch_dsp002_incremental_contract: POST assignment uses 201/401/403/404/409; route_id is nullable but only omission/null is enabled until RTE-001; OWN is enabled while EXTERNAL remains reserved for EXT-001 and ALLY_CAPACITY for ALY-004
  dispatch_dsp002_non_enumerable_visibility: capability-first returns 403 before resource access for actors without global Dispatch capability; authorized actors always execute order_packages then driver_profile_documents and return one uniform 404 for missing/cross-tenant order or driver; artificial delay and cause-specific normal logging are prohibited
  dispatch_dsp002_capability_before_persisted_state: pure request-shape validation may return 409 INVALID_REQUEST before capability without opening a productive transaction; every structurally valid request reads current tenant-aware capability before idempotency lock/record, replay evidence, order, packages, driver or documents; actors without capability receive one uniform 403 independently of idempotency state
