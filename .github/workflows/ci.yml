name: Foundation CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  normative:
    name: Validate normative baseline
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Validate canonical contracts
        run: python ./docs/normative/v0.6/tools/validate_contracts.py

      - name: Verify AI-06 checksum
        shell: bash
        run: |
          actual="$(sha256sum ./docs/normative/v0.6/database/AI-06_SCHEMA.sql | cut -d ' ' -f 1)"
          test "$actual" = "4b5fe5397ff088b63e0c288770903512665c5fe8a8dc7401d7e4d3af64643505"

      - name: Verify the normative baseline was not changed
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: git diff --exit-code "$BASE_SHA" HEAD -- docs/normative/v0.6

  dotnet:
    name: Build and test .NET
    runs-on: ubuntu-latest
    env:
      CI: "true"
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: "**/packages.lock.json"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build

  web:
    name: Validate web workspace
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.15.1
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm --dir apps/web install --frozen-lockfile

      - name: Lint
        run: pnpm --dir apps/web lint

      - name: Typecheck
        run: pnpm --dir apps/web typecheck

      - name: Test
        run: pnpm --dir apps/web test

      - name: Build
        run: pnpm --dir apps/web build
