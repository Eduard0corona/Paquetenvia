name: Foundation CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  normative:
    name: Validate normative baseline
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install validator dependencies
        run: python -m pip install PyYAML==6.0.3

      - name: Validate canonical contracts
        run: python ./docs/normative/v0.6/tools/validate_contracts.py

      - name: Verify AI-06 checksum
        shell: bash
        run: |
          actual="$(sha256sum ./docs/normative/v0.6/database/AI-06_SCHEMA.sql | cut -d ' ' -f 1)"
          test "$actual" = "4b5fe5397ff088b63e0c288770903512665c5fe8a8dc7401d7e4d3af64643505"

      - name: Verify the normative baseline was not changed
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: git diff --exit-code "$BASE_SHA" HEAD -- docs/normative/v0.6

  dotnet:
    name: Build and test .NET
    runs-on: ubuntu-latest
    env:
      CI: "true"
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: "**/packages.lock.json"

      - name: Restore
        run: dotnet restore --locked-mode

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build --filter "Category!=PostgreSqlContract"

  runtime-contracts:
    name: Validate runtime contracts
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI: "true"
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: "**/packages.lock.json"

      - name: Restore locked contract dependencies
        run: dotnet restore ./tests/Paqueteria.ContractTests/Paqueteria.ContractTests.csproj --locked-mode

      - name: Build contract tests
        run: dotnet build ./tests/Paqueteria.ContractTests/Paqueteria.ContractTests.csproj --configuration Release --no-restore

      - name: Execute PostgreSQL runtime contracts
        run: >-
          dotnet test ./tests/Paqueteria.ContractTests/Paqueteria.ContractTests.csproj
          --configuration Release
          --no-build
          --filter "Category=PostgreSqlContract"
          --logger "trx;LogFileName=runtime-contracts.trx"
          --results-directory ./TestResults/runtime-contracts

      - name: Capture Testcontainers diagnostics
        if: failure()
        shell: bash
        run: |
          docker version
          docker ps --all --no-trunc
          for container_id in $(docker ps --all --quiet --filter "label=org.testcontainers.lang=dotnet"); do
            docker logs --tail 200 "$container_id" || true
          done

      - name: Publish failed runtime test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-contract-test-results
          path: ./TestResults/runtime-contracts
          if-no-files-found: ignore
          retention-days: 7

      - name: Clean Testcontainers resources
        if: always()
        shell: bash
        run: |
          container_ids=$(docker ps --all --quiet --filter "label=org.testcontainers.lang=dotnet")
          if [ -n "$container_ids" ]; then
            docker rm --force $container_ids
          fi
          network_ids=$(docker network ls --quiet --filter "label=org.testcontainers.lang=dotnet")
          if [ -n "$network_ids" ]; then
            docker network rm $network_ids
          fi

  web:
    name: Validate web workspace
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.15.1
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm --dir apps/web install --frozen-lockfile

      - name: Lint
        run: pnpm --dir apps/web lint

      - name: Typecheck
        run: pnpm --dir apps/web typecheck

      - name: Test
        run: pnpm --dir apps/web test

      - name: Build
        run: pnpm --dir apps/web build

  infrastructure:
    name: Validate local infrastructure
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Generate synthetic CI environment
        shell: pwsh
        run: |
          $projectName = "paquetenvia-ci-${{ github.run_id }}-${{ github.run_attempt }}"
          Get-Content ./deploy/.env.example |
            ForEach-Object {
              if ($_ -match '^COMPOSE_PROJECT_NAME=') {
                "COMPOSE_PROJECT_NAME=$projectName"
              }
              else {
                $_
              }
            } |
            Set-Content ./deploy/.env.ci -Encoding utf8

      - name: Validate Compose configuration
        shell: pwsh
        run: >-
          docker compose
          --env-file ./deploy/.env.ci
          --file ./deploy/docker-compose.yml
          config --quiet

      - name: Run infrastructure smoke and persistence tests
        shell: pwsh
        run: >-
          ./tools/test-local-environment.ps1
          -EnvironmentFile ./deploy/.env.ci
          -CI
          -TimeoutSeconds 300

      - name: Capture infrastructure diagnostics
        if: failure()
        shell: pwsh
        run: |
          docker compose --env-file ./deploy/.env.ci --file ./deploy/docker-compose.yml ps --all
          docker compose --env-file ./deploy/.env.ci --file ./deploy/docker-compose.yml logs --tail 200

      - name: Clean infrastructure resources
        if: always()
        shell: pwsh
        run: |
          if (Test-Path ./deploy/.env.ci) {
            docker compose --env-file ./deploy/.env.ci --file ./deploy/docker-compose.yml down --volumes --remove-orphans
            Remove-Item ./deploy/.env.ci -Force
          }
