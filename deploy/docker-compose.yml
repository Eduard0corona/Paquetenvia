services:
  postgres:
    image: postgis/postgis:18-3.6@sha256:b410052c6f0d7d37b83cac1369df144e1c843971155dea3317961001704d0a9d
    platform: linux/amd64
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./postgres/init/001_extensions.sql:/docker-entrypoint-initdb.d/001_extensions.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 20s
    security_opt:
      - no-new-privileges:true
    networks:
      - local_environment
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:8.2.7-alpine@sha256:223b183cbc49f5ff48728e1fc52ccf101f05072decad2bd9867281a3c9bf75fd
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    command:
      - /bin/sh
      - -c
      - exec redis-server --appendonly yes --appendfsync everysec --requirepass "$${REDIS_PASSWORD}"
    ports:
      - "127.0.0.1:${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --no-auth-warning -a \"$${REDIS_PASSWORD}\" PING | grep -q PONG"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    networks:
      - local_environment
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    ports:
      - "127.0.0.1:${MINIO_API_HOST_PORT:-9000}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_HOST_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 15s
    security_opt:
      - no-new-privileges:true
    networks:
      - local_environment
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z@sha256:a7fe349ef4bd8521fb8497f55c6042871b2ae640607cf99d9bede5e9bdf11727
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      MINIO_BUCKET: ${MINIO_BUCKET:?MINIO_BUCKET is required}
      MC_CONFIG_DIR: /tmp/.mc
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}" >/dev/null
        mc mb --ignore-existing "local/$${MINIO_BUCKET}"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    networks:
      - local_environment

  mailpit:
    image: axllent/mailpit:v1.30.3@sha256:956d688cbd13dca36c72d8e94c34d6d1cdf4a005aa6aa4ff6edaaac56c34d8df
    restart: unless-stopped
    environment:
      MP_DATABASE: /data/mailpit.db
      MP_DISABLE_VERSION_CHECK: "true"
      MP_LABEL: Paquetenvia local
      MP_MAX_MESSAGES: "500"
    ports:
      - "127.0.0.1:${MAIL_SMTP_HOST_PORT:-1025}:1025"
      - "127.0.0.1:${MAIL_UI_HOST_PORT:-8025}:8025"
    volumes:
      - mailpit_data:/data
    healthcheck:
      test: ["CMD", "/mailpit", "readyz"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    networks:
      - local_environment
    logging:
      options:
        max-size: "10m"
        max-file: "3"

networks:
  local_environment:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
  mailpit_data:
